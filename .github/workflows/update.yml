name: Update IPTV Playlist

on:
  schedule:
    - cron: "*/40 * * * *"   # প্রতি 20 মিনিটে run (token expiry handle)
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo clone
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Python setup
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3. Dependencies install
      - name: Install dependencies
        run: |
          pip install requests

      # 4. Run script (SECRET inject)
      - name: Run scraper
        env:
          API_USER: ${{ secrets.API_USER }}
        run: |
          python main.py

      # 5. Commit changes (only if changed)
      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist.m3u
          git diff --cached --quiet || git commit -m "Auto update playlist"

      # 6. Push
      - name: Push changes
        run: |
          git push
